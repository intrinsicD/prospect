name: ci
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev,learn]"
      - run: ruff check .
      # the typing rule is enforced (P0-009)
      - run: make typecheck
      - run: pytest -q
      # regression ratchet (P0-007): every shipped phase's gate must still pass
      - run: make gate-all
