  - id: N05
    type: question
    title: "When does predictive coverage become useful control support?"
    provenance: ai-suggested
    timestamp: "2026-07-13T17:40+02:00"
    description: >
      Identify a falsifiable repository-native mechanism that explains why reaching
      more or higher-reward states can fail to improve downstream model-based control,
      while preserving Prospect's current planner, model, and benchmark contracts.
    status: open
  - id: N06
    type: experiment
    title: "BH-001 point-coverage and downstream-return reanalysis"
    provenance: ai-executed
    timestamp: "2026-07-13T17:40+02:00"
    evidence:
      - "ara/evidence/bh001-coverage-return-reanalysis-2026-07-13.md"
      - "bench/hard/results/BH-001-report.json::curiosity"
    result: >
      Across the six random/curious arm-seed rows, maximum reached reward and
      downstream return had Pearson r=-0.8640 (exact two-sided permutation p=0.0292)
      and Spearman rho=-0.7714 (p=0.1028). Curiosity raised maximum reward and lowered
      return in all three paired seeds, but the exact two-sided three-pair sign test was
      p=0.25. The small arm-confounded result is hypothesis-generating only.
    status: resolved
  - id: N07
    type: dead_end
    title: "Broad reliability-percolation control coverage as a novelty claim"
    provenance: ai-executed
    timestamp: "2026-07-13T17:40+02:00"
    hypothesis: >
      Reliability percolation and control-cut coverage form a broadly novel predictive
      exploration primitive.
    failure_mode: >
      Learned graph planning, coverability and sequence-coverage theory, path/cut
      analysis, and conformal reachability already occupy the broad conceptual space.
    lesson: >
      Retain only the narrow, unestablished conjecture that correlated transition
      reliability may create a measurable threshold with finite-size scaling in a
      matched Prospect fixture.
    evidence:
      - "docs/research/2026-07-13-predictive-reliability-portfolio.md#111-final-novelty-disposition"
    status: resolved
  - id: N08
    type: dead_end
    title: "Continuous trajectory syndrome as a broad novelty claim"
    provenance: ai-executed
    timestamp: "2026-07-13T17:40+02:00"
    hypothesis: >
      Treating world-model failures as continuous trajectory syndromes is itself a
      broadly novel diagnostic theory.
    failure_mode: >
      Existing world-action consistency and fault-diagnosis work already provides the
      broad residual and syndrome vocabulary.
    lesson: >
      A potentially useful contribution must be narrowed to a formal Prospect-head
      diagnosability and isolability matrix tied to distinct repairs.
    evidence:
      - "docs/research/2026-07-13-predictive-reliability-portfolio.md#111-final-novelty-disposition"
    status: resolved
  - id: N09
