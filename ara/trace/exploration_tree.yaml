tree:
  - id: N01
    type: question
    title: "First maturity-building experiment"
    provenance: user
    timestamp: "2026-07-17T19:11+02:00"
    description: >-
      What should Prospect do first to progress toward a mature, well-working
      world-model-based agent?
    status: resolved
    children:
      - id: N03
        type: experiment
        title: "Run WM-001 v1.3 end-to-end formal lifecycle"
        provenance: ai-executed
        timestamp: "2026-07-18T07:49+02:00"
        result: >-
          Eight prospectively fixed formal replicates completed. Each retained
          496 episodes, 99,200 transitions, 20 policy runs, 12 predictive rows,
          five committed training phases, one rejected probe, and 15 checkpoint
          components. Producer K0-K7 all passed: task-A NLL gain versus frozen
          was 3.5556 [3.4764, 3.6349], executed return gain was 863.12
          [643.14, 1083.11], retained A-gain fraction was 1.3468
          [0.8979, 1.7958], and every restart difference was zero. The
          independent audit completed 6,392,734 checks with two failures and no
          coverage gaps, so the attempt did not receive formal acceptance.
        evidence:
          - "docs/wm001-v130-formal-results.md"
          - "bench/world_model_lifecycle/results/formal/fcb544699d62797999aa40aadcb94ff19af0acac39212f438302aad337a8709b/20260718-v130-8cc5a8b-attempt1"
          - "artifacts/wm001-audits/formal-fcb54469-20260718-v130.json"
          - "artifacts/wm001-adjudications/formal-fcb54469-20260718-v130-rejected"
        status: resolved
        children:
          - id: N04
            type: decision
            title: "Reject attempt acceptance without refuting the hypothesis"
            provenance: ai-executed
            timestamp: "2026-07-18T07:49+02:00"
            choice: >-
              Preserve the immutable producer artifact and bounded mechanism
              evidence, but reject this attempt's claim eligibility because
              the mandatory pre-bound independent audit did not pass.
            alternatives:
              - "Accept from producer gates or a corrected post-hoc audit."
              - "Discard the entire artifact as evidence that the agent failed."
              - "Reject acceptance while retaining bounded producer evidence."
            evidence:
              - N02
              - N03
              - "docs/wm001-v130-formal-results.md"
              - "artifacts/wm001-adjudications/formal-fcb54469-20260718-v130-rejected"
            also_depends_on: [N02]
            status: resolved
            children: []
          - id: N05
            type: experiment
            title: "Harden future audit and rejection custody"
            provenance: ai-executed
            timestamp: "2026-07-18T07:49+02:00"
            result: >-
              Corrected auditor seed parity against protocol.json, replaced
              floating-fraction coverage tolerance with discrete target-count
              checks, and introduced adjudication v3 so a coherent failed audit
              can be immutably packaged only as rejected with a fatal semantic
              finding. Ruff, both mypy scopes, 85 epistemic tests, and 176
              world-model tests passed. Commit 77d6db6 records the changes;
              they apply only to future bindings and cannot upgrade N03.
            evidence:
              - "bench/world_model_lifecycle/artifact_audit.py"
              - "bench/world_model_lifecycle/adjudication.py"
              - "tests/test_world_model_artifact_audit.py"
              - "tests/test_world_model_adjudication.py"
              - "git:77d6db6"
            status: resolved
            children: []
  - id: N02
    type: experiment
    title: "Reproduce formal coverage-audit mismatch"
    provenance: ai-executed
    timestamp: "2026-07-18T07:31+02:00"
    result: >-
      Independent decoding of predictive metric 4 found exactly one differing
      target among 6400: sidecar row 207, target dimension 0. The bound CUDA
      Torch float32 producer computed PIT 0.05000000074505806 and counted it
      covered; the NumPy float64 auditor computed 0.049999998325471175 and
      counted it uncovered. An 80-digit recomputation from the exact stored
      float32 tensors gave 0.0499999983254711630649, below 0.05. The aggregate
      coverage difference was 0.00015625000000007994; the auditor's intended
      one-target tolerance was 0.00015625 and failed only through binary
      rounding in math.isclose.
    evidence:
      - "bench/world_model_lifecycle/results/formal/fcb544699d62797999aa40aadcb94ff19af0acac39212f438302aad337a8709b/20260718-v130-8cc5a8b-attempt1"
      - "artifacts/wm001-audits/formal-fcb54469-20260718-v130.json"
    status: resolved
    children: []
  - id: N06
    type: experiment
    title: "Audit v1.4 development finalization failure"
    provenance: ai-executed
    timestamp: "2026-07-18T14:27+02:00"
    result: >-
      The immutable failed development attempt retained valid custody for all
      74 manifested files. After adding the two already-sealed K3 comparator
      labels to the raw-result schema, the unchanged result produced zero
      schema errors and passed the complete producer result verifier. Protocol
      seal verification, exact sealed-file hashes, diff hygiene, and all 21
      binding tests passed. The recorded producer exception was limited to the
      prior comparator-enum omission; no second producer-side finalization
      blocker was found.
    evidence:
      - "bench/world_model_lifecycle/results/development/20260718-v140-rehearsal"
      - "bench/world_model_lifecycle/schemas/raw-result.schema.json"
      - "tests/test_world_model_binding.py"
      - "bench/world_model_lifecycle/SEALED_PROTOCOL.sha256"
    also_depends_on: [N05]
    status: resolved
    children: []
  - id: N07
    type: experiment
    title: "Qualify and bind WM-001 v1.4"
    provenance: ai-executed
    timestamp: "2026-07-19T02:42+02:00"
    result: >-
      The fresh qualifying development attempt completed on seeds 2439054559
      and 3246851043. The corrected auditor passed 1,598,247 checks with zero
      failures and zero gaps. A fresh prebinding check passed ruff, 33 normal
      mypy targets, two scoped mypy targets, 85 epistemic tests, and 198
      world-model tests. Binding
      96628f7d551f14f50108a51ee454fe725e7e439501ca5ffe081cf891c0f17857
      then fixed the corrected auditor, exact coverage conformance corpus,
      runtime, and eight fresh formal seeds before outcomes.
    evidence:
      - "bench/world_model_lifecycle/results/development/20260718-v140-rehearsal-attempt2"
      - "artifacts/wm001-audits/20260718-v140-rehearsal-attempt2.json"
      - "artifacts/wm001-binding-20260718-v140-confirmation/formal-binding.json"
      - "docs/wm001-v140-confirmation-plan.md"
    also_depends_on: [N05, N06]
    status: resolved
    children: []
  - id: N08
    type: experiment
    title: "Run sole WM-001 v1.4 formal confirmation"
    provenance: ai-executed
    timestamp: "2026-07-19T02:42+02:00"
    result: >-
      All eight prospectively fixed formal replicates completed under the sole
      claimed launch. Producer K0-K7 passed. Exact pooled after-A coverage was
      49,949/51,200; task-A NLL gain versus frozen was 3.5388
      [3.4511, 3.6266], executed return gain was 893.60
      [667.17, 1120.03], retained A-gain fraction was 1.3501
      [0.8362, 1.8640], and every K7 restart difference was zero. The direct
      corrected bound-runtime audit passed 6,393,031 checks with zero failures
      or gaps. One content-addressed semantic review incorporating three
      adversarial referee passes accepted the bounded fixture claim.
    evidence:
      - "docs/wm001-v140-formal-results.md"
      - "bench/world_model_lifecycle/results/formal/96628f7d551f14f50108a51ee454fe725e7e439501ca5ffe081cf891c0f17857/20260718-v140-confirmation"
      - "artifacts/wm001-audits/20260718-v140-formal-confirmation.json"
      - "artifacts/wm001-audits/20260718-v140-formal-semantic-review.json"
    also_depends_on: [N07]
    status: resolved
    children: []
  - id: N09
    type: dead_end
    title: "Reproduce the passing audit inside adjudication"
    provenance: ai-executed
    timestamp: "2026-07-19T02:42+02:00"
    hypothesis: >-
      The corrected pre-bound audit report would reproduce byte-for-byte when
      the adjudicator executed the captured auditor under python -I, permitting
      publication of an accepted package.
    failure_mode: >-
      Isolated Python hid the user-site locations from which bound
      farama-notifications 0.0.6 and gymnasium 0.29.1 had been resolved. The
      descriptor-bound replay returned 289 failures and one coverage gap, so
      accepted packaging exited 2. Rejected packaging of the preserved failing
      replay also exited 2 because audit-identity verification requires
      successful coverage conformance for every disposition.
    lesson: >-
      Package identities alone do not seal dependency visibility under the
      exact execution mode. Future confirmation must byte-compare the direct
      and descriptor-bound isolated auditor on a no-outcome fixture before
      binding, and its rejection path must preserve an identity-valid audit
      whose fatal finding is environment conformance itself.
    evidence:
      - "artifacts/wm001-audits/20260719-v140-adjudication-replay-diagnostic-1.json"
      - "artifacts/wm001-audits/20260719-v140-formal-semantic-review-rejected.json"
      - "docs/wm001-v140-formal-results.md"
    also_depends_on: [N07, N08]
    status: resolved
    children: []
  - id: N10
    type: decision
    title: "Retire v1.4 without formal acceptance"
    provenance: ai-executed
    timestamp: "2026-07-19T02:42+02:00"
    choice: >-
      Preserve the producer, direct audit, semantic review, and failing
      adjudication replay as bounded evidence; publish neither an accepted nor
      a nonexistent rejected package; do not retry v1.4; require a fresh
      protocol and seed domain for any v1.5 confirmation.
    alternatives:
      - "Accept the fixture claim despite canonical audit-reproduction failure."
      - "Modify or retry the sole v1.4 formal attempt after observing outcomes."
      - "Discard all bounded mechanism evidence because adjudication failed."
    evidence:
      - N08
      - N09
      - "docs/wm001-v140-formal-results.md"
    also_depends_on: [N08, N09]
    status: resolved
    children: []
