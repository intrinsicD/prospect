  - id: N22
    type: experiment
    title: "OL-002 component-isolating simulator-oracle ladder"
    provenance: ai-executed
    timestamp: "2026-07-14T01:52+02:00"
    evidence:
      - "bench/oracle_ladder_v2/results/OL-002/OL-002-results.json"
      - "bench/oracle_ladder_v2/results/OL-002/OL-002-report.md"
      - "bench/oracle_ladder_v2/results/OL-002/artifact-manifest.json"
      - "ara/evidence/oracle-ladder-ol002-2026-07-14.md"
    result: >
      All eight replay/parity blocks and the exact ceiling passed. The frozen decision
      classified a mixed transition-stack and reward-stack failure: exact-target
      transitions improved 8/8 seeds, closed 79.35% of the oracle-return gap, and raised
      success from 6.25% to 84.375%; exact reward then improved 8/8 seeds and raised
      success to 100%. Penalty removal, TS-infinity versus recursive mean, and online
      versus target refresh were not material. The full prefix curve ran but established
      no minimum recovery depth.
    status: resolved
  - id: N23
    type: dead_end
    title: "Penalty, member propagation, or refresh interface as the primary blocker"
    provenance: ai-executed
    timestamp: "2026-07-14T01:52+02:00"
    hypothesis: >
      The BC-001 failure is primarily explained by the epistemic penalty coefficient,
      TS-infinity member propagation, or the online-versus-target refresh interface.
    failure_mode: >
      The frozen contrasts were not material: penalty removal closed 1.36% of the gap,
      recursive mean versus TS-infinity closed -25.73%, and online versus target refresh
      closed 10.93%; none improved fixed-bank median normalized regret.
    lesson: >
      Do not select uncertainty-penalty tuning, member-propagation changes, or refresh-
      interface changes from this fixture; the material evidence is instead bound to
      the transition stack and learned reward stack.
    evidence:
      - N22
      - "ara/evidence/oracle-ladder-ol002-2026-07-14.md#frozen-component-contrasts"
    status: resolved
  - id: N24
    type: dead_end
    title: "A stable monotone compounding-error recovery knee"
    provenance: ai-executed
    timestamp: "2026-07-14T01:52+02:00"
    hypothesis: >
      Increasing the exact-transition prefix produces a stable monotone recovery curve
      with an identifiable minimum depth.
    failure_mode: >
      Success was nonmonotonic across k=1,2,4,8,12, and seven of eight seed returns
      reversed from k=8 to k=12; the frozen no-knee rule therefore returned no minimum.
    lesson: >
      Treat prefix depth as interacting with learned reward ranking and the learned
      transition tail until a new experiment separates them; do not infer a simple
      rollout-error threshold.
    evidence:
      - N22
      - "ara/evidence/oracle-ladder-ol002-2026-07-14.md#prefix-ladder"
    status: resolved
