      - "bench/bridge_control/results/BC-001/dataset-manifest.json"
      - "ara/evidence/bridge-control-bc001-2026-07-13.md"
    result: >
      All eight 896-row primary cells matched x-region-by-lane counts, nuisance
      multisets, and coordinate-wise action histograms. Bridge edges were exactly 0
      versus 16, local action minimum singular value 0 versus 0.67082, and unique
      controllable support 1 versus 8. Ten datasets, including two named controls,
      regenerated under their semantic hashes.
    status: resolved
  - id: N15
    type: experiment
    title: "BC-001 sequential control screen"
    provenance: ai-executed
    timestamp: "2026-07-13T21:29+02:00"
    evidence:
      - "bench/bridge_control/results/BC-001/BC-001-results.json"
      - "bench/bridge_control/results/BC-001/BC-001-report.md"
      - "ara/evidence/bridge-control-bc001-2026-07-13.md"
    result: >
      Across 32 fixed starts per arm, exact dynamics/reward succeeded 32/32, the
      designated balanced learned arm succeeded 2/32, and random succeeded 0/32. The
      frozen 80% learned-control floor failed, so BC-001 stopped before seven remaining
      factorial cells or negative-control training. A joint exact-transition,
      learned-reward, zero-epistemic diagnostic succeeded 27/32; it rules out reward as
      the sole blocker but does not separate transition, representation, and epistemic
      effects.
    status: resolved
  - id: N16
    type: dead_end
    title: "BC-001 as a causal assay for active T1"
    provenance: ai-executed
    timestamp: "2026-07-13T21:29+02:00"
    hypothesis: >
      After one permitted redesign, the current FlatWorldModel and FlatPlanner can
      solve the fully balanced BridgeControl arm well enough to estimate bridge, rank,
      and density effects.
    failure_mode: >
      The balanced arm achieved 6.25% success against the frozen 80% floor despite the
      exact-model control achieving 100%.
    lesson: >
      Retire BC-001 and T1 as the active mechanism program under the predeclared rule;
      report no structural effect and do not rescue the assay with post-hoc cells,
      thresholds, or hyperparameters.
    evidence:
      - N15
      - "docs/research/2026-07-13-predictive-reliability-portfolio.md#9-pre-execution-pareto-frontier-and-post-execution-disposition"
    status: resolved
