  - id: O04
    timestamp: "2026-07-10T15:45+02:00"
    provenance: ai-suggested
    content: >
      FFT colored-noise sampling should assign the DC bin the lowest resolved
      frequency's scale and divide the inverse-filtered samples by the L2 norm of
      the inverse FFT of that scale vector. This preserves Gaussian unit marginal
      variance without forcing every short action sequence to have zero temporal
      mean.
    context: "Read-only U-002 algorithm and state-shape audit."
    potential_type: heuristic
