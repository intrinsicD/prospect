    provenance: ai-suggested
    content: >
      No pretrained pair plugs directly into Prospect's single shared LatentState:
      image/video codecs expose spatial or spatiotemporal tensors, audio codecs expose
      continuous tensors or hierarchical tokens, and T5 decoders condition on token
      sequences. Thin pooling/projection and inverse adapters remain necessary. A
      continuous audio latent such as DAC is cleaner for Prospect's diagonal-Gaussian
      Prediction contract than treating discrete codec indices as Gaussian states.
    context: >
