  - id: O03
    timestamp: "2026-07-10T15:43+02:00"
    provenance: ai-suggested
    content: >
      For U-002, per-seed P2 non-regression margin is planner_return minus the larger
      of baseline_return and random_return. The immediately pre-U-002 U-001 report sets
      floors of 17.263924584, 0.708487315, and 2.304867583 for seeds 0, 1, and 2;
      ordinary P2 PASS only enforces positive margins and does not enforce this ratchet.
    context: "Inspection of bench/results/P2-20260710T131536Z.json."
    potential_type: constraint
