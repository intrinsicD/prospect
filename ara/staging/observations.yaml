  - id: O11
    timestamp: "2026-07-19T02:42+02:00"
    provenance: ai-suggested
    content: >-
      A formal binding must seal not only dependency identities but their
      visibility under the exact adjudication execution mode. Prebinding must
      compare direct and descriptor-bound isolated canonical audit bytes on a
      no-outcome conformance fixture.
    context: >-
      The v1.4 direct auditor resolved two transitive distributions from user
      site, while the adjudicator's python -I replay could not see them.
    potential_type: constraint
    bound_to: [N09, N10]
    promoted: true
    promoted_to: "logic/solution/constraints.md:R05"
    crystallized_via: artifact-commitment
    stale: false
  - id: O12
    timestamp: "2026-07-19T02:42+02:00"
    provenance: ai-suggested
    content: >-
      Rejected-evidence custody must permit publication of a source- and
      binding-identified failing audit when the fatal finding is runtime or
      coverage conformance itself; otherwise the same condition that causes
      rejection prevents preservation of the official rejected package.
    context: >-
      The v1.4 rejected adjudication exited 2 because identity verification
      required coverage_conformance_verified=true for every disposition.
    potential_type: constraint
    bound_to: [N09, N10]
    promoted: true
    promoted_to: "logic/solution/constraints.md:R06"
    crystallized_via: artifact-commitment
    stale: false
  - id: O13
    timestamp: "2026-07-20T16:18+02:00"
    provenance: ai-suggested
    content: >-
      Manifest-bound terminal custody for a potentially large producer member
      must stream exact size and digest verification through a no-follow
      descriptor while retaining regular-file, exact-link-count, stable
      before/after inode, mutation, and pathname-namespace checks.
    context: >-
      The sole v1.7 development closure failed when its final producer recheck
      materialized a 320,556,697-byte result under a generic 64 MiB helper
      limit; v1.8 commits the streamed repair and adversarial regressions.
    potential_type: constraint
    bound_to: [N11, N12, N13]
    promoted: true
    promoted_to: "logic/solution/constraints.md:R07"
    crystallized_via: artifact-commitment
    stale: false
